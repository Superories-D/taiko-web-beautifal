<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>Taiko Web Admin</title>
        <link rel="icon" href="{{config.assets_baseurl}}img/favicon.png" type="image/png">
        <meta name="viewport" content="width=device-width, user-scalable=no">
        
        <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
        <link href="{{config.basedir}}src/css/admin.css" rel="stylesheet">
    </head>
    <body>
        <header>
            <div class="nav">
                <div class="admin-brand">Taiko Admin</div>
                <a href="{{config.basedir}}admin/overview"{% if request.path.endswith('/admin/overview') %} class="active"{% endif %}>Overview</a>
                <a href="{{config.basedir}}admin/messages"{% if '/admin/messages' in request.path %} class="active"{% endif %}>Messages</a>
                <a href="{{config.basedir}}admin/songs"{% if '/admin/songs' in request.path %} class="active"{% endif %}>Songs</a>
                <a href="{{config.basedir}}admin/users"{% if '/admin/users' in request.path %} class="active"{% endif %}>Users</a>
            </div>
        </header>
        
        <main>
            <div class="container">
                {% block content %}{% endblock %}
            </div>
        </main>
    </body>
</html>
