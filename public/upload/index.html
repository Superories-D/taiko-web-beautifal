<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Upload a TJA chart and audio file directly to this Taiko Web server.">
    <title>Taiko Web - Song Upload</title>
    <link rel="icon" href="../assets/img/favicon.ico" sizes="any">
    <link rel="apple-touch-icon" href="../assets/img/apple-touch-icon.png">
    <link rel="stylesheet" href="style.css">
    <script src="upload.js" defer></script>
  </head>
  <body>
    <main class="upload-shell">
      <header class="upload-header">
        <img src="../assets/img/favicon-192.png" alt="" class="upload-mark">
        <div>
          <p class="eyebrow">Taiko Web Tools</p>
          <h1>Song Upload</h1>
          <p>Upload a TJA chart and audio file directly to this Taiko Web server.</p>
          <p class="locale-note">Supports Chinese, Japanese, and Korean song metadata inside TJA files.</p>
        </div>
      </header>

      <form id="upload-form" class="upload-card" enctype="multipart/form-data">
        <label for="file_tja">TJA chart file</label>
        <input id="file_tja" type="file" name="file_tja" accept=".tja" required>

        <label for="file_music">Audio file</label>
        <input id="file_music" type="file" name="file_music" accept=".ogg,.mp3,.wav,.m4a,.flac" required>

        <label for="song_type">Song category</label>
        <select id="song_type" name="song_type" required>
          <option value="12 Custom" selected>12 Custom</option>
        </select>

        <button id="submit-button" type="submit">Upload Song</button>
      </form>

      <section class="upload-card" aria-live="polite">
        <h2>Upload Status</h2>
        <p id="status-view">Waiting for files.</p>
        <pre id="error-view"></pre>
      </section>
    </main>
  </body>
</html>
