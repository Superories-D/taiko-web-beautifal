<div id="loader">
	<div class="loader-logo">
		<div class="loader-icon" aria-hidden="true"></div>
		<div class="loader-title">Taiko Web</div>
		<div class="loader-subtitle">Rhythm starts here</div>
	</div>
	<div class="loader-bar-container">
		<div class="progress"></div>
		<div class="progress-shimmer"></div>
		<span class="percentage">0%</span>
	</div>
	<div class="loader-status">
		<span class="loader-status-text">Loading</span>
		<span class="loader-dots">
			<span class="dot"></span>
			<span class="dot"></span>
			<span class="dot"></span>
		</span>
	</div>
	<div class="loader-meta">
		<span class="loader-stage">Stage: Boot Minimal</span>
		<span class="loader-count">Progress: 0 / 0</span>
		<span class="loader-failed">Failed: 0</span>
	</div>
	<div class="loader-retry"></div>
	<div class="loader-warmup-warning"></div>
</div>
<div class="view-outer loader-error-div">
	<div class="view">
		<div class="view-content">An error occurred, please refresh</div>
		<div class="diag-txt"></div>
		<span class="debug-link">Debug</span>
	</div>
</div>
