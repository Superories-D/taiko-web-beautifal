<div id="weekly-challenge-container">
	<div id="weekly-challenge">
		<div id="weekly-challenge-close" class="stroke-sub" alt="x">x</div>
		<div class="weekly-challenge-header">
			<div class="weekly-challenge-title"></div>
			<div class="weekly-challenge-status" hidden></div>
		</div>
		<div class="weekly-challenge-content">
			<section class="weekly-challenge-song">
				<h2 class="weekly-challenge-song-heading"></h2>
				<div class="weekly-challenge-song-title"></div>
				<div class="weekly-challenge-song-subtitle"></div>
				<div class="weekly-challenge-song-meta"></div>
			</section>
			<section class="weekly-challenge-board weekly-challenge-current">
				<h2 class="weekly-challenge-current-heading"></h2>
				<ol class="weekly-challenge-current-list"></ol>
			</section>
			<section class="weekly-challenge-board weekly-challenge-previous">
				<h2 class="weekly-challenge-previous-heading"></h2>
				<div class="weekly-challenge-previous-song"></div>
				<ol class="weekly-challenge-previous-list"></ol>
			</section>
		</div>
		<button type="button" id="weekly-challenge-start" disabled></button>
	</div>
</div>
